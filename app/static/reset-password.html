<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoCortex AI – איפוס סיסמה</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box { background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.12); padding:2.5rem 2rem; width:100%; max-width:380px; border:1px solid var(--border); }
        .login-logo { text-align:center; margin-bottom:2rem; }
        .login-logo .logo-neo { font-size:1.8rem; font-weight:900; letter-spacing:4px; color:#1a56db; }
        .login-logo .logo-cortex { font-size:1.8rem; font-weight:300; letter-spacing:4px; color:#4b9fdb; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:.3rem; }
        .msg { border-radius:8px; padding:.6rem .9rem; font-size:.85rem; margin-bottom:1rem; }
        .msg-error { background:#fef2f2; border:1px solid #fca5a5; color:#c81e1e; }
        .msg-success { background:#f0fdf4; border:1px solid #86efac; color:#166534; }
    </style>
</head>
<body>
<canvas id="neural-bg"></canvas>
<div class="login-box">
    <div class="login-logo">
        <div><span class="logo-neo">NEO</span><span class="logo-cortex">CORTEX</span></div>
    </div>
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:1.25rem">הגדרת סיסמה חדשה</h2>

    <div id="msg" class="msg" style="display:none"></div>
    <div id="form-area">
        <div class="form-group">
            <label>סיסמה חדשה</label>
            <input type="password" id="new_password" placeholder="לפחות 6 תווים" autocomplete="new-password" />
        </div>
        <div class="form-group">
            <label>אימות סיסמה</label>
            <input type="password" id="confirm_password" placeholder="הכנס שוב" autocomplete="new-password" />
        </div>
        <button type="button" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="submit-btn">שמור סיסמה</button>
    </div>
</div>

<script>
const token = new URLSearchParams(location.search).get("token");
if (!token) {
    document.getElementById("form-area").style.display = "none";
    const msgEl = document.getElementById("msg");
    msgEl.className = "msg msg-error"; msgEl.textContent = "קישור לא תקין"; msgEl.style.display = "block";
}

document.getElementById("submit-btn")?.addEventListener("click", async () => {
    const new_password = document.getElementById("new_password").value;
    const confirm = document.getElementById("confirm_password").value;
    const msgEl = document.getElementById("msg");
    msgEl.style.display = "none";
    if (new_password.length < 6) {
        msgEl.className = "msg msg-error"; msgEl.textContent = "הסיסמה חייבת להכיל לפחות 6 תווים"; msgEl.style.display = "block"; return;
    }
    if (new_password !== confirm) {
        msgEl.className = "msg msg-error"; msgEl.textContent = "הסיסמאות אינן תואמות"; msgEl.style.display = "block"; return;
    }
    try {
        const res = await fetch("/auth/reset-password", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({token, new_password})
        });
        if (res.ok) {
            document.getElementById("form-area").style.display = "none";
            msgEl.className = "msg msg-success";
            msgEl.textContent = "הסיסמה אופסה בהצלחה! מעביר לדף הכניסה...";
            msgEl.style.display = "block";
            setTimeout(() => { location.href = "/login"; }, 2000);
        } else {
            const data = await res.json();
            msgEl.className = "msg msg-error"; msgEl.textContent = data.detail || "שגיאה"; msgEl.style.display = "block";
        }
    } catch(e) {
        msgEl.className = "msg msg-error"; msgEl.textContent = "שגיאה, נסה שוב"; msgEl.style.display = "block";
    }
});
</script>
</body>
</html>
