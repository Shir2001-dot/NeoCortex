<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoCortex AI – כניסה</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo .logo-neo { font-size:1.8rem; font-weight:900; letter-spacing:4px; color:#1a56db; }
        .login-logo .logo-cortex { font-size:1.8rem; font-weight:300; letter-spacing:4px; color:#4b9fdb; }
        .login-logo .logo-sub { font-size:.78rem; color:var(--muted); margin-top:.25rem; }
        .login-box h2 { font-size:1rem; font-weight:700; margin-bottom:1.25rem; color:var(--text); }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:.3rem; }
        .error-msg { background:#fef2f2; border:1px solid #fca5a5; color:#c81e1e; border-radius:8px; padding:.6rem .9rem; font-size:.85rem; margin-bottom:1rem; }
        .login-footer { text-align:center; font-size:.75rem; color:var(--muted); margin-top:1.5rem; }
    </style>
</head>
<body>
<canvas id="neural-bg"></canvas>
<div class="login-box">
    <div class="login-logo">
        <div><span class="logo-neo">NEO</span><span class="logo-cortex">CORTEX</span></div>
        <div class="logo-sub">מערכת תמיכה קלינית</div>
    </div>
    <h2>כניסה למערכת</h2>

    <div id="error-msg" class="error-msg" style="display:none">מספר תעודת זהות או סיסמה שגויים</div>
    <div class="form-group">
        <label for="id_number">מספר תעודת זהות</label>
        <input type="text" id="id_number" placeholder="מספר תעודת זהות" autocomplete="username" inputmode="numeric" />
    </div>
    <div class="form-group">
        <label for="password">סיסמה</label>
        <input type="password" id="password" placeholder="הכנס סיסמה" autocomplete="current-password" />
    </div>
    <button type="button" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="login-btn">כניסה →</button>

    <div style="display:flex;align-items:center;gap:.75rem;margin:.9rem 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:.75rem;color:var(--muted)">או</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <a href="/auth/auth0/login" style="display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-size:.88rem;font-weight:600;text-decoration:none;transition:background .15s" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='#fff'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1a56db" stroke-width="2"/><path d="M8 12h8M12 8v8" stroke="#1a56db" stroke-width="2" stroke-linecap="round"/></svg>
        כניסה עם Auth0
    </a>

    <div style="text-align:center;margin-top:.75rem">
        <a href="/forgot-password" style="font-size:.78rem;color:var(--primary);text-decoration:none">שכחתי סיסמה</a>
    </div>

    <div id="auth0-error" style="display:none;background:#fef2f2;border:1px solid #fca5a5;color:#c81e1e;border-radius:8px;padding:.6rem .9rem;font-size:.85rem;margin-top:.75rem">
        המשתמש לא נמצא במערכת. פנה למנהל המרפאה להגדרת האימייל שלך.
    </div>

    <div class="login-footer">Beta · לשימוש קליני מורשה בלבד</div>
</div>

<script>
const params = new URLSearchParams(location.search);
if (params.get("error")) document.getElementById("error-msg").style.display = "block";
if (params.get("error") === "auth0_no_user") {
    document.getElementById("error-msg").style.display = "none";
    document.getElementById("auth0-error").style.display = "block";
}

async function doLogin() {
    const id_number = document.getElementById("id_number").value.trim();
    const password = document.getElementById("password").value;
    document.getElementById("error-msg").style.display = "none";
    try {
        const res = await fetch("/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({id_number, password}),
            credentials: "include",
        });
        if (res.ok) {
            const user = await res.json();
            location.href = user.role === "admin" ? "/admin" : "/";
        } else {
            document.getElementById("error-msg").style.display = "block";
        }
    } catch(e) {
        document.getElementById("error-msg").style.display = "block";
    }
}

document.getElementById("login-btn").addEventListener("click", doLogin);
document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

// Neural background
const canvas = document.getElementById("neural-bg");
const ctx = canvas.getContext("2d");
let W, H, nodes = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);
for (let i = 0; i < 40; i++) nodes.push({ x: Math.random()*W, y: Math.random()*H, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, r:Math.random()*2+1, pulse:Math.random()*Math.PI*2 });
function draw() {
    ctx.clearRect(0,0,W,H);
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<150){ ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.strokeStyle=`rgba(26,86,219,${(1-d/150)*.12})`; ctx.lineWidth=.7; ctx.stroke(); }
    }
    nodes.forEach(n => {
        n.pulse+=.02; const g=(Math.sin(n.pulse)+1)*.5;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r+g*.4,0,Math.PI*2);
        ctx.fillStyle=`rgba(26,86,219,${.2+g*.2})`; ctx.fill();
        n.x+=n.vx; n.y+=n.vy;
        if(n.x<0||n.x>W) n.vx*=-1; if(n.y<0||n.y>H) n.vy*=-1;
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
