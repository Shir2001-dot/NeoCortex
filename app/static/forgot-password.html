<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoCortex AI – שכחתי סיסמה</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-box { background:#fff; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.12); padding:2.5rem 2rem; width:100%; max-width:380px; border:1px solid var(--border); }
        .login-logo { text-align:center; margin-bottom:2rem; }
        .login-logo .logo-neo { font-size:1.8rem; font-weight:900; letter-spacing:4px; color:#1a56db; }
        .login-logo .logo-cortex { font-size:1.8rem; font-weight:300; letter-spacing:4px; color:#4b9fdb; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:.3rem; }
        .msg { border-radius:8px; padding:.6rem .9rem; font-size:.85rem; margin-bottom:1rem; }
        .msg-error { background:#fef2f2; border:1px solid #fca5a5; color:#c81e1e; }
        .msg-success { background:#f0fdf4; border:1px solid #86efac; color:#166534; }
    </style>
</head>
<body>
<canvas id="neural-bg"></canvas>
<div class="login-box">
    <div class="login-logo">
        <div><span class="logo-neo">NEO</span><span class="logo-cortex">CORTEX</span></div>
    </div>
    <h2 style="font-size:1rem;font-weight:700;margin-bottom:1.25rem">איפוס סיסמה</h2>
    <p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:1.25rem">הכנס את מספר תעודת הזהות והאימייל שלך. נשלח אליך קישור לאיפוס הסיסמה.</p>

    <div id="msg" class="msg" style="display:none"></div>
    <div class="form-group">
        <label>מספר תעודת זהות</label>
        <input type="text" id="id_number" placeholder="מספר תעודת זהות" inputmode="numeric" />
    </div>
    <div class="form-group">
        <label>אימייל</label>
        <input type="email" id="email" placeholder="example@clinic.co.il" />
    </div>
    <button type="button" class="btn btn-primary" style="width:100%;margin-top:.5rem" id="submit-btn">שלח קישור לאיפוס</button>
    <div style="text-align:center;margin-top:.75rem">
        <a href="/login" style="font-size:.78rem;color:var(--primary);text-decoration:none">← חזרה לכניסה</a>
    </div>
</div>

<script>
document.getElementById("submit-btn").addEventListener("click", async () => {
    const id_number = document.getElementById("id_number").value.trim();
    const email = document.getElementById("email").value.trim();
    const msgEl = document.getElementById("msg");
    msgEl.style.display = "none";
    if (!id_number || !email) {
        msgEl.className = "msg msg-error"; msgEl.textContent = "נא למלא את כל השדות"; msgEl.style.display = "block"; return;
    }
    try {
        const res = await fetch("/auth/forgot-password", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({id_number, email})
        });
        const data = await res.json();
        msgEl.className = "msg msg-success";
        msgEl.textContent = data.msg || "נשלח מייל לאיפוס סיסמה";
        msgEl.style.display = "block";
        document.getElementById("submit-btn").disabled = true;
    } catch(e) {
        msgEl.className = "msg msg-error"; msgEl.textContent = "שגיאה, נסה שוב"; msgEl.style.display = "block";
    }
});
</script>
</body>
</html>
